# ============================================================
# Docker Compose - Development Overrides (Hot-Reload)
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================================

version: "3.9"

services:
  # ─────────────────────────────────────────────
  # PostgreSQL - Development settings
  # ─────────────────────────────────────────────
  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: devpassword

  # ─────────────────────────────────────────────
  # Redis - Development settings
  # ─────────────────────────────────────────────
  redis:
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

  # ─────────────────────────────────────────────
  # OpenSearch - Development settings
  # ─────────────────────────────────────────────
  opensearch:
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
      - "5601:5601"

  # ─────────────────────────────────────────────
  # Temporal - Development settings
  # ─────────────────────────────────────────────
  temporal:
    environment:
      - POSTGRES_PWD=devpassword
    ports:
      - "7233:7233"
      - "8080:8080"

  temporal-ui:
    ports:
      - "8081:8080"

  # ─────────────────────────────────────────────
  # FastAPI Backend - Development (hot-reload)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.backend
      target: dev
    container_name: pm-backend-dev
    environment:
      DATABASE_URL: postgresql+asyncpg://pm_admin:devpassword@postgres:5432/pm_internship
      REDIS_URL: redis://redis:6379/0
      OPENSEARCH_URL: http://opensearch:9200
      TEMPORAL_ADDRESS: temporal:7233
      SECRET_KEY: dev-secret-key-not-for-production
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      LOG_LEVEL: debug
      DEBUG: "1"
    volumes:
      - ../../backend:/app
      - /app/__pycache__
      - /app/.mypy_cache
      - /app/.pytest_cache
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────────
  # Next.js Frontend - Development (hot-reload)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend
      target: dev
    container_name: pm-frontend-dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    volumes:
      - ../../frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────────
  # PgAdmin - Database GUI
  # ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pm-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pm-internship.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:5050"
    depends_on:
      - postgres
    networks:
      - pm-network

  # ─────────────────────────────────────────────
  # Redis Commander
  # ─────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: pm-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:devpassword
    ports:
      - "8082:8081"
    depends_on:
      - redis
    networks:
      - pm-network

  # ─────────────────────────────────────────────
  # MailHog - Email testing
  # ─────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: pm-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - pm-network

volumes:
  pgadmin_data:
    driver: local
