# ============================================================
# Deploy to Staging - PM Internship Smart Allocation Engine
# ============================================================
# HOW TO ENABLE: This workflow runs manually (workflow_dispatch)
# and optionally on push to main when the AWS_ROLE_ARN secret is set.
# To enable automatic staging deploys on every merge to main:
#   1. Set up AWS OIDC federation for GitHub Actions
#   2. Add these secrets to the repository:
#      - AWS_ROLE_ARN, STAGING_SUBNETS, STAGING_SG, STAGING_URL, STAGING_API_KEY
#   3. Uncomment the push trigger below.
# ============================================================

name: Deploy Staging

on:
  workflow_dispatch:   # Manual trigger only — enable push trigger once AWS is configured
  # push:
  #   branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  AWS_REGION: ap-south-1
  ECS_CLUSTER: pm-internship-staging
  ECS_SERVICE_BACKEND: pm-backend-staging
  ECS_SERVICE_FRONTEND: pm-frontend-staging

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────
  # Build & Push Backend Image
  # ─────────────────────────────────────────────
  build-backend:
    name: "Build & Push Backend"
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.backend
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

  # ─────────────────────────────────────────────
  # Build & Push Frontend Image
  # ─────────────────────────────────────────────
  build-frontend:
    name: "Build & Push Frontend"
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.frontend
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

  # ─────────────────────────────────────────────
  # Run Database Migrations
  # ─────────────────────────────────────────────
  migrate:
    name: "Run Database Migrations"
    runs-on: ubuntu-latest
    needs: [build-backend]
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run migrations via ECS task
        run: |
          aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition pm-migrate-staging \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.STAGING_SUBNETS }}],securityGroups=[${{ secrets.STAGING_SG }}],assignPublicIp=ENABLED}" \
            --launch-type FARGATE \
            --overrides '{
              "containerOverrides": [{
                "name": "migrate",
                "command": ["alembic", "upgrade", "head"]
              }]
            }'

      - name: Wait for migration to complete
        run: |
          aws ecs wait tasks-stopped \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks $(aws ecs list-tasks \
              --cluster ${{ env.ECS_CLUSTER }} \
              --family pm-migrate-staging \
              --desired-status STOPPED \
              --query 'taskArns[0]' \
              --output text)

  # ─────────────────────────────────────────────
  # Deploy to ECS Staging
  # ─────────────────────────────────────────────
  deploy-backend:
    name: "Deploy Backend to Staging"
    runs-on: ubuntu-latest
    needs: [build-backend, migrate]
    environment: staging
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_BACKEND }} \
            --force-new-deployment \
            --query 'service.serviceName'

      - name: Wait for service stable
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE_BACKEND }}

  deploy-frontend:
    name: "Deploy Frontend to Staging"
    runs-on: ubuntu-latest
    needs: [build-frontend]
    environment: staging
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE_FRONTEND }} \
            --force-new-deployment \
            --query 'service.serviceName'

      - name: Wait for service stable
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE_FRONTEND }}

  # ─────────────────────────────────────────────
  # Smoke Tests
  # ─────────────────────────────────────────────
  smoke-test:
    name: "Staging Smoke Tests"
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    environment: staging
    env:
      STAGING_URL: ${{ secrets.STAGING_URL }}
    steps:
      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Health check - Backend
        run: |
          for i in {1..5}; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$STAGING_URL/api/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Backend health check passed"
              exit 0
            fi
            echo "⏳ Attempt $i: Backend returned $STATUS, retrying..."
            sleep 10
          done
          echo "❌ Backend health check failed"
          exit 1

      - name: Health check - Frontend
        run: |
          for i in {1..5}; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$STAGING_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Frontend health check passed"
              exit 0
            fi
            echo "⏳ Attempt $i: Frontend returned $STATUS, retrying..."
            sleep 10
          done
          echo "❌ Frontend health check failed"
          exit 1

      - name: API endpoint smoke test
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.STAGING_API_KEY }}" \
            "$STAGING_URL/api/v1/candidates?limit=1" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Candidates API accessible"
          else
            echo "⚠️ Candidates API returned $STATUS (may require auth)"
          fi
